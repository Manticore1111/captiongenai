<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>System Settings - Admin Panel</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <div class="logo">ViralCaption AI</div>
            <div class="header-actions">
                <a href="index.html" class="home-btn">Home</a>
            </div>
            <p>System Settings</p>
        </header>
        <main>
            <div class="settings">
                <h2>System Configuration</h2>
                <form id="settingsForm">
                    <div class="setting-group">
                        <label for="siteTitle">Site Title</label>
                        <input type="text" id="siteTitle" value="ViralCaption AI">
                    </div>
                    <div class="setting-group">
                        <label for="maxFreeGenerations">Max Free Generations</label>
                        <input type="number" id="maxFreeGenerations" value="1">
                    </div>
                    <div class="setting-group">
                        <label for="subscriptionPrice">Subscription Price (€)</label>
                        <input type="number" id="subscriptionPrice" value="2.99" step="0.01">
                    </div>
                    <div class="setting-group">
                        <label for="maintenanceMode">Maintenance Mode</label>
                        <input type="checkbox" id="maintenanceMode">
                    </div>
                    <div class="setting-group">
                        <label for="emailNotifications">Email Notifications</label>
                        <input type="checkbox" id="emailNotifications" checked>
                    </div>
                    <button type="submit">Save Settings</button>
                </form>
                <div id="settingsMessage" class="message" style="display: none;"></div>
            </div>
        </main>
        <footer>
            <a href="admin-panel.html">Back to Admin Panel</a>
        </footer>
    </div>
    <script src="system-settings.js"></script>
</body>
</html>
