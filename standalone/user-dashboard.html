<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Dashboard - ViralCaption AI</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <div class="logo">ViralCaption AI</div>
            <div class="header-actions">
                <a href="index.html" class="home-btn">Home</a>
                <span id="userGreeting"></span>
                <button onclick="userLogout()" class="logout-btn">Logout</button>
            </div>
            <p>User Dashboard</p>
        </header>
        <main>
            <div class="user-stats">
                <h2>Your Stats</h2>
                <div class="stats-grid">
                    <div class="stat-card">
                        <h3>Generations Used</h3>
                        <p id="userGenerations">5</p>
                    </div>
                    <div class="stat-card">
                        <h3>Subscription Status</h3>
                        <p id="userSubscription">Free</p>
                    </div>
                    <div class="stat-card">
                        <h3>Account Created</h3>
                        <p id="userCreated">Today</p>
                    </div>
                </div>
            </div>
            <div class="user-actions">
                <h2>Actions</h2>
                <button onclick="window.location.href='index.html'">Generate Captions</button>
                <button onclick="alert('Feature not implemented')">View History</button>
                <button onclick="alert('Feature not implemented')">Upgrade Subscription</button>
                <button onclick="alert('Feature not implemented')">Account Settings</button>
            </div>
        </main>
        <footer>
            <a href="index.html">Back to Home</a>
        </footer>
    </div>
    <script src="user-dashboard.js"></script>
</body>
</html>
