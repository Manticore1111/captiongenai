<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel - ViralCaption AI</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <div class="logo">ViralCaption AI</div>
            <div class="header-actions">
                <a href="index.html" class="home-btn">Home</a>
            </div>
            <p>Administrator Panel</p>
        </header>
        <main>
            <div class="admin-stats">
                <h2>Dashboard</h2>
                <div class="stats-grid">
                    <div class="stat-card">
                        <h3>Total Users</h3>
                        <p id="totalUsers">1,234</p>
                    </div>
                    <div class="stat-card">
                        <h3>Generations Today</h3>
                        <p id="generationsToday">567</p>
                    </div>
                    <div class="stat-card">
                        <h3>Revenue</h3>
                        <p id="revenue">€3,456</p>
                    </div>
                    <div class="stat-card">
                        <h3>Active Sessions</h3>
                        <p id="activeSessions">89</p>
                    </div>
                </div>
            </div>
            <div class="recent-activity">
                <h2>Recent User Activity</h2>
                <div id="activityLog"></div>
            </div>
            <div class="admin-actions">
                <h2>Actions</h2>
                <button onclick="manageUsers()">Manage Users</button>
                <button onclick="viewReports()">View Reports</button>
                <button onclick="systemSettings()">System Settings</button>
                <button onclick="logout()">Logout</button>
            </div>
        </main>
        <footer>
            <a href="index.html">Back to Home</a>
        </footer>
    </div>
    <script src="admin-panel.js"></script>
</body>
</html>
