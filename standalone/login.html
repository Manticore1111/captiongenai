<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - ViralCaption AI</title>
    <style>
        :root {
            --primary: #6366f1;
            --primary-dark: #4f46e5;
            --primary-light: #e0e7ff;
            --accent: #ec4899;
            --accent-dark: #be185d;
            --success: #10b981;
            --danger: #ef4444;
            --dark: #1f2937;
            --light: #f3f4f6;
            --white: #ffffff;
            --text: #374151;
            --text-light: #6b7280;
            --border: #e5e7eb;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .login-container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            width: 100%;
            max-width: 450px;
            padding: 50px 40px;
            animation: slideUp 0.6s ease;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .login-header {
            text-align: center;
            margin-bottom: 40px;
        }

        .logo {
            font-size: 2.5rem;
            margin-bottom: 15px;
        }

        .login-header h1 {
            color: var(--dark);
            font-size: 1.8rem;
            margin-bottom: 8px;
            font-weight: 700;
        }

        .login-header p {
            color: var(--text-light);
            font-size: 0.95rem;
        }

        .form-group {
            margin-bottom: 25px;
        }

        label {
            display: block;
            color: var(--text);
            font-weight: 600;
            margin-bottom: 10px;
            font-size: 0.95rem;
        }

        input[type="email"],
        input[type="password"] {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid var(--border);
            border-radius: 10px;
            font-size: 1rem;
            transition: all 0.3s;
            font-family: inherit;
        }

        input[type="email"]:focus,
        input[type="password"]:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.1);
        }

        input[type="email"]::placeholder,
        input[type="password"]::placeholder {
            color: var(--text-light);
        }

        .remember-forgot {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            font-size: 0.9rem;
        }

        .remember-forgot label {
            display: flex;
            align-items: center;
            margin: 0;
            cursor: pointer;
        }

        input[type="checkbox"] {
            margin-right: 8px;
            cursor: pointer;
            width: 18px;
            height: 18px;
        }

        .forgot-password {
            color: var(--primary);
            text-decoration: none;
            font-weight: 600;
            transition: color 0.3s;
        }

        .forgot-password:hover {
            color: var(--primary-dark);
        }

        .login-btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, var(--primary), var(--accent));
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .login-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(99, 102, 241, 0.3);
        }

        .login-btn:active {
            transform: translateY(0);
        }

        .divider {
            text-align: center;
            margin: 30px 0;
            position: relative;
        }

        .divider::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 0;
            right: 0;
            height: 1px;
            background: var(--border);
            z-index: 0;
        }

        .divider span {
            background: white;
            padding: 0 15px;
            color: var(--text-light);
            font-size: 0.9rem;
            position: relative;
            z-index: 1;
        }

        .signup-link {
            text-align: center;
            color: var(--text);
            font-size: 0.95rem;
        }

        .signup-link a {
            color: var(--primary);
            text-decoration: none;
            font-weight: 700;
            transition: color 0.3s;
        }

        .signup-link a:hover {
            color: var(--primary-dark);
        }

        .error-message {
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid #fecaca;
            color: #991b1b;
            padding: 12px 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-size: 0.9rem;
            display: none;
            animation: slideDown 0.4s ease;
        }

        .error-message.show {
            display: block;
        }

        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .loading {
            display: none;
            text-align: center;
            color: var(--primary);
            font-weight: 600;
            margin-top: 10px;
        }

        .spinner {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 2px solid #f3f4f6;
            border-top: 2px solid var(--primary);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-right: 8px;
            vertical-align: middle;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        @media (max-width: 480px) {
            .login-container {
                padding: 30px 25px;
            }

            .login-header h1 {
                font-size: 1.5rem;
            }

            .remember-forgot {
                flex-direction: column;
                align-items: flex-start;
                gap: 10px;
            }
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-header">
            <div class="logo">⚡</div>
            <h1>Welcome Back</h1>
            <p>Log in to your ViralCaption account</p>
        </div>

        <div class="error-message" id="errorMessage"></div>

        <form id="loginForm">
            <div class="form-group">
                <label for="email">Email Address</label>
                <input 
                    type="email" 
                    id="email" 
                    name="email"
                    placeholder="you@example.com"
                    required
                >
            </div>

            <div class="form-group">
                <label for="password">Password</label>
                <input 
                    type="password" 
                    id="password" 
                    name="password"
                    placeholder="••••••••"
                    required
                >
            </div>

            <div class="remember-forgot">
                <label>
                    <input type="checkbox" id="rememberMe">
                    Remember me
                </label>
                <a href="forgot-password.html" class="forgot-password">Forgot password?</a>
            </div>

            <button type="submit" class="login-btn">
                Sign In
            </button>

            <div class="loading" id="loading">
                <span class="spinner"></span>Signing in...
            </div>
        </form>

        <div class="divider">
            <span>Don't have an account?</span>
        </div>

        <div class="signup-link">
            <p>New to ViralCaption? <a href="register.html">Create an account</a></p>
        </div>
    </div>

    <script>
        // Session Management
        const SessionManager = {
            STORAGE_KEY: 'vcai_user_session',
            TOKEN_KEY: 'vcai_auth_token',
            USER_KEY: 'vcai_user_data',

            setSession: function(user, token) {
                localStorage.setItem(this.TOKEN_KEY, token);
                localStorage.setItem(this.USER_KEY, JSON.stringify(user));
                localStorage.setItem(this.STORAGE_KEY, JSON.stringify({
                    user,
                    token,
                    loginTime: Date.now()
                }));
            },

            getSession: function() {
                const token = localStorage.getItem(this.TOKEN_KEY);
                const user = localStorage.getItem(this.USER_KEY);
                return {
                    token,
                    user: user ? JSON.parse(user) : null,
                    isLoggedIn: !!token && !!user
                };
            },

            clearSession: function() {
                localStorage.removeItem(this.TOKEN_KEY);
                localStorage.removeItem(this.USER_KEY);
                localStorage.removeItem(this.STORAGE_KEY);
            }
        };

        // Check if already logged in
        if (SessionManager.getSession().isLoggedIn) {
            window.location.href = 'dashboard.html';
        }

        // Form handling
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();

            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            const errorMessage = document.getElementById('errorMessage');
            const loading = document.getElementById('loading');
            const submitBtn = e.target.querySelector('button[type="submit"]');

            // Validation
            if (!email || !password) {
                errorMessage.textContent = '❌ Please enter email and password';
                errorMessage.classList.add('show');
                return;
            }

            // Show loading state
            errorMessage.classList.remove('show');
            loading.style.display = 'block';
            submitBtn.disabled = true;

            try {
                console.log('🔓 Attempting login for:', email);

                // Detect country from IP address
                let detectedCountry = 'Onbekend';
                let detectedIP = '';
                try {
                    const geoResponse = await fetch('https://ipapi.co/json/');
                    const geoData = await geoResponse.json();
                    detectedCountry = geoData.country_name || 'Onbekend';
                    detectedIP = geoData.ip || '';
                    console.log('🌍 Land gedetecteerd:', detectedCountry, '| IP:', detectedIP);
                } catch (geoErr) {
                    console.log('⚠️ Kon land niet detecteren:', geoErr.message);
                }

                // API call to backend
                const response = await fetch('http://localhost:5000/api/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password, country: detectedCountry, ip_address: detectedIP })
                });

                const data = await response.json();

                if (!response.ok || !data.success) {
                    console.log('❌ Login failed:', data.error);
                    throw new Error(data.error || 'Invalid email or password');
                }

                // Verify we got user data and token
                if (!data.token || !data.user) {
                    throw new Error('Invalid response from server');
                }

                console.log('✅ Login successful for:', email);

                // Store session in localStorage
                SessionManager.setSession({...data.user, country: detectedCountry, ip_address: detectedIP}, data.token);

                // Show success message
                errorMessage.style.background = 'rgba(16, 185, 129, 0.1)';
                errorMessage.style.borderColor = 'var(--success)';
                errorMessage.style.color = 'var(--success)';
                errorMessage.textContent = '✅ Login successful! Redirecting...';
                errorMessage.classList.add('show');
                loading.style.display = 'none';

                // Redirect to dashboard after short delay
                setTimeout(() => {
                    window.location.href = 'dashboard.html';
                }, 1000);

            } catch (error) {
                console.error('Login error:', error);
                
                // Show error message
                errorMessage.style.background = 'rgba(239, 68, 68, 0.1)';
                errorMessage.style.borderColor = 'var(--danger)';
                errorMessage.style.color = 'var(--danger)';
                errorMessage.textContent = '❌ ' + (error.message || 'Login failed. Please check your credentials.');
                errorMessage.classList.add('show');
                
                loading.style.display = 'none';
                submitBtn.disabled = false;
            }
        });
    </script>
</body>
</html>
