<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Account - ViralCaption AI</title>
    <style>
        :root {
            --primary: #6366f1;
            --primary-dark: #4f46e5;
            --primary-light: #e0e7ff;
            --accent: #ec4899;
            --accent-dark: #be185d;
            --success: #10b981;
            --danger: #ef4444;
            --dark: #1f2937;
            --light: #f3f4f6;
            --white: #ffffff;
            --text: #374151;
            --text-light: #6b7280;
            --border: #e5e7eb;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .register-container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            width: 100%;
            max-width: 500px;
            padding: 50px 40px;
            animation: slideUp 0.6s ease;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .register-header {
            text-align: center;
            margin-bottom: 35px;
        }

        .logo {
            font-size: 2.5rem;
            margin-bottom: 15px;
        }

        .register-header h1 {
            color: var(--dark);
            font-size: 1.8rem;
            margin-bottom: 8px;
            font-weight: 700;
        }

        .register-header p {
            color: var(--text-light);
            font-size: 0.95rem;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            color: var(--text);
            font-weight: 600;
            margin-bottom: 8px;
            font-size: 0.9rem;
        }

        input[type="text"],
        input[type="email"],
        input[type="password"],
        input[type="tel"] {
            width: 100%;
            padding: 11px 14px;
            border: 2px solid var(--border);
            border-radius: 10px;
            font-size: 0.95rem;
            transition: all 0.3s;
            font-family: inherit;
        }

        input:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.1);
        }

        input::placeholder {
            color: var(--text-light);
        }

        .password-strength {
            margin-top: 8px;
            height: 4px;
            background: var(--light);
            border-radius: 2px;
            overflow: hidden;
            display: none;
        }

        .password-strength-bar {
            height: 100%;
            width: 0%;
            transition: all 0.3s;
            border-radius: 2px;
        }

        .strength-weak { background: var(--danger); }
        .strength-fair { background: #f59e0b; }
        .strength-good { background: #3b82f6; }
        .strength-strong { background: var(--success); }

        .terms {
            font-size: 0.85rem;
            color: var(--text-light);
            margin: 20px 0;
        }

        .terms input {
            width: auto;
            margin-right: 8px;
            cursor: pointer;
            height: 16px;
            width: 16px;
        }

        .terms label {
            display: inline;
            margin: 0;
            font-weight: 400;
            cursor: pointer;
        }

        .terms a {
            color: var(--primary);
            text-decoration: none;
            font-weight: 600;
        }

        .register-btn {
            width: 100%;
            padding: 13px;
            background: linear-gradient(135deg, var(--primary), var(--accent));
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-top: 15px;
        }

        .register-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(99, 102, 241, 0.3);
        }

        .register-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .login-link {
            text-align: center;
            color: var(--text);
            font-size: 0.9rem;
            margin-top: 20px;
        }

        .login-link a {
            color: var(--primary);
            text-decoration: none;
            font-weight: 700;
        }

        .error-message {
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid #fecaca;
            color: #991b1b;
            padding: 12px 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-size: 0.9rem;
            display: none;
        }

        .error-message.show {
            display: block;
        }

        @media (max-width: 480px) {
            .register-container {
                padding: 30px 25px;
            }

            .register-header h1 {
                font-size: 1.5rem;
            }
        }
    </style>
</head>
<body>
    <div class="register-container">
        <div class="register-header">
            <div class="logo">⚡</div>
            <h1>Create Account</h1>
            <p>Join ViralCaption AI today</p>
        </div>

        <div class="error-message" id="errorMessage"></div>

        <form id="registerForm">
            <div class="form-group">
                <label for="fullName">Full Name</label>
                <input 
                    type="text" 
                    id="fullName" 
                    name="fullName"
                    placeholder="John Doe"
                    required
                >
            </div>

            <div class="form-group">
                <label for="registerEmail">Email Address</label>
                <input 
                    type="email" 
                    id="registerEmail" 
                    name="email"
                    placeholder="you@example.com"
                    required
                >
            </div>

            <div class="form-group">
                <label for="registerPassword">Password</label>
                <input 
                    type="password" 
                    id="registerPassword" 
                    name="password"
                    placeholder="••••••••"
                    required
                >
                <div class="password-strength" id="passwordStrength">
                    <div class="password-strength-bar" id="strengthBar"></div>
                </div>
            </div>

            <div class="form-group">
                <label for="confirmPassword">Confirm Password</label>
                <input 
                    type="password" 
                    id="confirmPassword" 
                    name="confirmPassword"
                    placeholder="••••••••"
                    required
                >
            </div>

            <div class="form-group">
                <label for="phone">Phone (Optional)</label>
                <input 
                    type="tel" 
                    id="phone" 
                    name="phone"
                    placeholder="+31 6 12345678"
                >
            </div>

            <div class="terms">
                <label>
                    <input type="checkbox" id="agreeTerms" required>
                    I agree to the <a href="#">Terms of Service</a> and <a href="#">Privacy Policy</a>
                </label>
            </div>

            <button type="submit" class="register-btn">Create My Account</button>
        </form>

        <div class="login-link">
            <p>Already have an account? <a href="login.html">Sign in</a></p>
        </div>
    </div>

    <script>
        const SessionManager = {
            STORAGE_KEY: 'vcai_user_session',
            TOKEN_KEY: 'vcai_auth_token',
            USER_KEY: 'vcai_user_data',

            setSession: function(user, token) {
                localStorage.setItem(this.TOKEN_KEY, token);
                localStorage.setItem(this.USER_KEY, JSON.stringify(user));
            },

            getSession: function() {
                const token = localStorage.getItem(this.TOKEN_KEY);
                const user = localStorage.getItem(this.USER_KEY);
                return {
                    token,
                    user: user ? JSON.parse(user) : null,
                    isLoggedIn: !!token && !!user
                };
            }
        };

        // Check if already logged in
        if (SessionManager.getSession().isLoggedIn) {
            window.location.href = 'dashboard.html';
        }

        // Password strength checker
        document.getElementById('registerPassword').addEventListener('input', (e) => {
            const password = e.target.value;
            const strengthBar = document.getElementById('strengthBar');
            const strengthDiv = document.getElementById('passwordStrength');
            
            strengthDiv.style.display = password ? 'block' : 'none';

            let strength = 0;
            if (password.length >= 8) strength++;
            if (/[a-z]/.test(password)) strength++;
            if (/[A-Z]/.test(password)) strength++;
            if (/[0-9]/.test(password)) strength++;
            if (/[^a-zA-Z0-9]/.test(password)) strength++;

            const width = (strength / 5) * 100;
            strengthBar.style.width = width + '%';

            strengthBar.className = 'password-strength-bar';
            if (strength === 1) strengthBar.classList.add('strength-weak');
            else if (strength === 2) strengthBar.classList.add('strength-fair');
            else if (strength === 3 || strength === 4) strengthBar.classList.add('strength-good');
            else if (strength === 5) strengthBar.classList.add('strength-strong');
        });

        // Form submission
        document.getElementById('registerForm').addEventListener('submit', async (e) => {
            e.preventDefault();

            const fullName = document.getElementById('fullName').value;
            const email = document.getElementById('registerEmail').value;
            const password = document.getElementById('registerPassword').value;
            const confirmPassword = document.getElementById('confirmPassword').value;
            const phone = document.getElementById('phone').value;
            const errorMessage = document.getElementById('errorMessage');

            // Validation
            if (!fullName) {
                errorMessage.textContent = '❌ Please enter your full name';
                errorMessage.classList.add('show');
                return;
            }

            if (password !== confirmPassword) {
                errorMessage.textContent = '❌ Passwords do not match';
                errorMessage.classList.add('show');
                return;
            }

            if (password.length < 8) {
                errorMessage.textContent = '❌ Password must be at least 8 characters';
                errorMessage.classList.add('show');
                return;
            }

            try {
                // Show loading state
                const submitBtn = e.target.querySelector('button[type="submit"]');
                const originalText = submitBtn.textContent;
                submitBtn.textContent = '⏳ Creating account...';
                submitBtn.disabled = true;

                // API call to backend
                const response = await fetch('http://localhost:5000/api/auth/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        name: fullName,
                        email,
                        password,
                        phone: phone || null,
                        country: null
                    })
                });

                const data = await response.json();

                if (!response.ok) {
                    throw new Error(data.error || 'Registration failed');
                }

                // Show success message
                errorMessage.style.background = 'rgba(16, 185, 129, 0.1)';
                errorMessage.style.borderColor = 'var(--success)';
                errorMessage.style.color = 'var(--success)';
                errorMessage.textContent = '✅ ' + (data.message || 'Registration successful! Redirecting...');
                errorMessage.classList.add('show');

                // Store session in localStorage
                if (data.token && data.user) {
                    SessionManager.setSession(data.user, data.token);
                }

                // Redirect to dashboard
                setTimeout(() => {
                    window.location.href = 'dashboard.html';
                }, 1500);

            } catch (error) {
                console.error('Registration error:', error);
                errorMessage.textContent = '❌ ' + (error.message || 'Registration failed. Please try again.');
                errorMessage.classList.add('show');
                
                // Reset button
                const submitBtn = e.target.querySelector('button[type="submit"]');
                submitBtn.textContent = 'Create My Account';
                submitBtn.disabled = false;
            }
        });
    </script>
</body>
</html>
