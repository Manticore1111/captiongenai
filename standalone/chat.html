<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Chatbox - ViralCaption AI</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="chat-page">
    <div class="container chat-container">
        <header class="chat-header">
            <div class="logo">
                <span class="logo-mark">VC</span>
                <span class="logo-text">ViralCaption AI</span>
            </div>
            <div class="header-actions">
                <a href="index.html" class="secondary-btn">Terug naar Home</a>
            </div>
            <p>Chat met onze AI voor caption ideeën, content tips en meer.</p>
        </header>

        <main class="chat-main">
            <div class="chat-window">
                <div class="chat-messages" id="chatMessages">
                    <div class="message ai-message">
                        <div class="message-avatar">AI</div>
                        <div class="message-content">
                            <p>Hoi! Ik ben je AI-assistent voor ViralCaption. Hoe kan ik je helpen met je social media content vandaag?</p>
                        </div>
                    </div>
                </div>
                <div class="chat-input-area">
                    <input type="text" id="chatInput" placeholder="Typ je vraag hier..." maxlength="500">
                    <button id="sendButton" class="primary-btn">Verstuur</button>
                </div>
            </div>
        </main>
    </div>

    <script src="chat.js"></script>
</body>
</html></content>
