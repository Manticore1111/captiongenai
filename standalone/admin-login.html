<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login - ViralCaption AI</title>
    <style>
        :root {
            --primary: #6366f1;
            --primary-dark: #4f46e5;
            --accent: #ec4899;
            --success: #10b981;
            --danger: #ef4444;
            --dark: #1f2937;
            --text: #374151;
            --text-light: #6b7280;
            --border: #e5e7eb;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #0f0c29 0%, #302b63 50%, #24243e 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .login-container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
            width: 100%;
            max-width: 480px;
            padding: 50px 40px;
            animation: slideUp 0.6s ease;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .login-header {
            text-align: center;
            margin-bottom: 40px;
        }

        .admin-badge {
            display: inline-block;
            background: linear-gradient(135deg, #ef4444, #dc2626);
            color: white;
            padding: 8px 20px;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: 700;
            letter-spacing: 1px;
            text-transform: uppercase;
            margin-bottom: 20px;
        }

        .login-header h1 {
            color: var(--dark);
            font-size: 2rem;
            margin-bottom: 8px;
            font-weight: 700;
        }

        .login-header p {
            color: var(--text-light);
            font-size: 0.95rem;
        }

        .form-group {
            margin-bottom: 25px;
        }

        label {
            display: block;
            color: var(--text);
            font-weight: 600;
            margin-bottom: 10px;
            font-size: 0.95rem;
        }

        input[type="email"],
        input[type="password"] {
            width: 100%;
            padding: 14px 18px;
            border: 2px solid var(--border);
            border-radius: 10px;
            font-size: 1rem;
            color: var(--text);
            transition: all 0.3s;
            background: #f9fafb;
        }

        input:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.1);
            background: white;
        }

        .btn-admin {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, #ef4444, #dc2626);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 1.1rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s;
            letter-spacing: 0.5px;
        }

        .btn-admin:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(239, 68, 68, 0.4);
        }

        .btn-admin:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .error-msg {
            display: none;
            padding: 12px 16px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-size: 0.9rem;
            font-weight: 600;
            text-align: center;
        }

        .error-msg.show { display: block; }
        .error-msg.error { background: rgba(239, 68, 68, 0.1); border: 1px solid var(--danger); color: var(--danger); }
        .error-msg.success { background: rgba(16, 185, 129, 0.1); border: 1px solid var(--success); color: var(--success); }

        .loading {
            display: none;
            text-align: center;
            padding: 15px;
            color: var(--text-light);
            font-weight: 600;
        }

        .back-link {
            text-align: center;
            margin-top: 25px;
        }

        .back-link a {
            color: var(--text-light);
            text-decoration: none;
            font-size: 0.9rem;
        }

        .back-link a:hover { color: var(--primary); }

        .security-note {
            text-align: center;
            margin-top: 25px;
            padding: 15px;
            background: #f9fafb;
            border-radius: 8px;
            font-size: 0.8rem;
            color: var(--text-light);
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-header">
            <div class="admin-badge">🔒 Admin Portaal</div>
            <h1>Beheerder Login</h1>
            <p>Log in met je admin account om het dashboard te openen</p>
        </div>

        <div class="error-msg" id="errorMessage"></div>
        <div class="loading" id="loading">⏳ Inloggen...</div>

        <form id="adminLoginForm">
            <div class="form-group">
                <label>� Gebruikersnaam</label>
                <input type="text" id="username" placeholder="Gebruikersnaam" required autocomplete="username">
            </div>

            <div class="form-group">
                <label>🔑 Wachtwoord</label>
                <input type="password" id="password" placeholder="Wachtwoord" required autocomplete="current-password">
            </div>

            <button type="submit" class="btn-admin">🔐 Inloggen als Admin</button>
        </form>

        <div class="back-link">
            <a href="index.html">← Terug naar Home</a>
        </div>

        <div class="security-note">
            🔒 Beveiligde verbinding. Alleen geautoriseerde beheerders hebben toegang.
        </div>
    </div>

    <script>
        const API_BASE = window.location.hostname === 'localhost' 
            ? 'http://localhost:5000' 
            : '';

        // Check als admin al ingelogd is
        const adminToken = localStorage.getItem('vcai_admin_token');
        if (adminToken) {
            window.location.href = 'admin-panel.html';
        }

        document.getElementById('adminLoginForm').addEventListener('submit', async function(e) {
            e.preventDefault();

            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value;
            const errorMsg = document.getElementById('errorMessage');
            const loading = document.getElementById('loading');
            const submitBtn = e.target.querySelector('button[type="submit"]');

            if (!username || !password) {
                errorMsg.textContent = '❌ Vul gebruikersnaam en wachtwoord in.';
                errorMsg.className = 'error-msg error show';
                return;
            }

            // Loading state
            errorMsg.className = 'error-msg';
            loading.style.display = 'block';
            submitBtn.disabled = true;

            try {
                const response = await fetch(API_BASE + '/api/admin/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });

                const data = await response.json();

                if (!response.ok || !data.success) {
                    throw new Error(data.error || 'Ongeldige inloggegevens.');
                }

                // Sla admin sessie op
                localStorage.setItem('vcai_admin_token', data.token);
                localStorage.setItem('vcai_admin_data', JSON.stringify(data.admin));

                // Succes melding
                errorMsg.textContent = '✅ Ingelogd! Doorsturen naar dashboard...';
                errorMsg.className = 'error-msg success show';
                loading.style.display = 'none';

                setTimeout(() => {
                    window.location.href = 'admin-panel.html';
                }, 1000);

            } catch (error) {
                errorMsg.textContent = '❌ ' + (error.message || 'Inloggen mislukt.');
                errorMsg.className = 'error-msg error show';
                loading.style.display = 'none';
                submitBtn.disabled = false;
            }
        });
    </script>
</body>
</html>
