<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Betaling geslaagd - ViralCaption AI</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .success-container {
            max-width: 480px;
            margin: 80px auto;
            background: #fff;
            border-radius: 24px;
            box-shadow: 0 12px 40px rgba(76, 175, 80, 0.13);
            padding: 40px 32px 32px;
            text-align: center;
        }
        .success-icon {
            font-size: 3.5rem;
            color: #4caf50;
            margin-bottom: 18px;
        }
        .success-container h1 {
            color: #2e7d32;
            margin-bottom: 12px;
        }
        .success-container p {
            color: #444;
            margin-bottom: 24px;
        }
        .success-container .primary-btn {
            background: #4caf50;
            color: white;
            border: none;
            padding: 14px 28px;
            border-radius: 20px;
            font-size: 1.1rem;
            font-weight: 700;
            text-decoration: none;
            box-shadow: 0 4px 18px rgba(76, 175, 80, 0.13);
            transition: background 0.2s;
        }
        .success-container .primary-btn:hover {
            background: #388e3c;
        }
    </style>
</head>
<body>
    <div class="success-container">
        <div class="success-icon">✅</div>
        <h1>Betaling geslaagd!</h1>
        <p>Je premium account is nu actief.<br>Veel plezier met onbeperkte captions en alle extra functies.</p>
        <a href="index.html" class="primary-btn">Naar de homepage</a>
    </div>
</body>
</html>
